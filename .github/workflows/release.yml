name: Build and publish release

# Al empujar un tag como v1.1.0, compila el .exe y el instalador en Windows,
# genera los checksums y publica el release con todos los assets.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Read app version
        id: ver
        shell: pwsh
        run: |
          $v = (Select-String -Path src/expoal/__init__.py -Pattern '__version__ = "([^"]+)"').Matches.Groups[1].Value
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "App version: $v"

      - name: Check tag matches version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          if ($tag -and $tag -ne "${{ steps.ver.outputs.version }}") {
            Write-Error "El tag ($tag) no coincide con __version__ (${{ steps.ver.outputs.version }})"
            exit 1
          }

      - name: Build executable (PyInstaller)
        run: uv run pyinstaller --noconfirm --windowed --name Expoal --icon assets/expoal.ico --add-data "src/expoal/web;expoal/web" launcher.py

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" installer\expoal.iss

      - name: Package portable zip and checksums
        shell: pwsh
        run: |
          Compress-Archive -Path dist\Expoal -DestinationPath dist\Expoal-windows.zip -CompressionLevel Optimal
          Set-Location dist
          $files = @("Expoal-${{ steps.ver.outputs.version }}-setup.exe", "Expoal-windows.zip")
          $lines = foreach ($f in $files) { "$((Get-FileHash $f -Algorithm SHA256).Hash.ToLower())  $f" }
          $lines | Out-File -FilePath SHA256SUMS.txt -Encoding ascii

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Expoal ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          body: |
            ## Download
            - **`Expoal-${{ steps.ver.outputs.version }}-setup.exe` (installer, recommended)** - a normal setup wizard with shortcuts and an uninstaller. No admin rights needed.
            - **`Expoal-windows.zip` (portable)** - unzip anywhere and run `Expoal.exe`.

            If Expoal is already installed, it can update itself from inside the app (one click).

            > **"Windows protected your PC"?** The app is not signed with a paid certificate, so SmartScreen may warn you the first time. Click **More info** -> **Run anyway**.

            > For MP3 and top-quality merges, install FFmpeg: `winget install Gyan.FFmpeg`
          files: |
            dist/Expoal-${{ steps.ver.outputs.version }}-setup.exe
            dist/Expoal-windows.zip
            dist/SHA256SUMS.txt
